<!-- Arabic Learning Game - Integrated into LumiLearn -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنيسي - لعبة تعلم اللغة العربية | LumiLearn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="jeux5.css">
    <style>
        /* Back button to games */
        .game-back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #FF91AF, #FFD36E);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 100;
        }
        
        .game-back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 145, 175, 0.4);
        }
    </style>
</head>
<body>

<!-- Back to Games Button -->
<a href="jeux_ar.html" class="game-back-link">← العودة للألعاب</a>

<!-- ===== PARTICLE CANVAS ===== -->
<canvas id="particleCanvas"></canvas>

<!-- ===== SCREENS ===== -->

<!-- SPLASH SCREEN -->
<div id="screen-splash" class="screen active">
    <div class="splash-content">
        <div class="splash-logo">
            <div class="logo-circle">
                <span class="logo-ar">أ</span>
            </div>
        </div>
        <h1 class="splash-title">أَنِيسِي</h1>
        <p class="splash-subtitle">رحلتي مع اللغة العربية</p>
        <div class="splash-stars">
            <span class="star-anim">⭐</span>
            <span class="star-anim">🌟</span>
            <span class="star-anim">⭐</span>
        </div>
        <button class="btn-primary btn-huge" id="btn-start">
            <span>ابدأ اللعبة</span>
            <span class="btn-icon">🚀</span>
        </button>
        <button class="btn-secondary" id="btn-reset-all">إعادة تعيين التقدم</button>
    </div>
</div>

<!-- MAIN MAP SCREEN -->
<div id="screen-map" class="screen">
    <div class="map-header">
        <div class="player-info">
            <div class="avatar-wrap">
                <div class="avatar" id="map-avatar">🧒</div>
            </div>
            <div class="player-stats">
                <div class="player-name">المتعلم الصغير</div>
                <div class="xp-bar-wrap">
                    <div class="xp-bar" id="xp-bar"></div>
                </div>
                <div class="xp-label" id="xp-label">0 / 100 XP</div>
            </div>
        </div>
        <div class="map-coins">
            <span class="coin-icon">🌟</span>
            <span id="total-stars">0</span>
        </div>
    </div>

    <h2 class="map-title">خريطة الرحلة</h2>

    <div class="worlds-container" id="worlds-container">
        <!-- Worlds generated by JS -->
    </div>
</div>

<!-- LEVEL SELECT SCREEN -->
<div id="screen-levels" class="screen">
    <div class="levels-header">
        <button class="btn-back" id="btn-back-map">
            <span>←</span> رجوع
        </button>
        <div class="world-title-wrap">
            <div class="world-icon-big" id="lvl-world-icon"></div>
            <h2 class="world-title-text" id="lvl-world-name"></h2>
        </div>
    </div>
    <div class="levels-grid" id="levels-grid">
        <!-- Levels generated by JS -->
    </div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen">
    <div class="game-header">
        <button class="btn-back-sm" id="btn-back-levels">✕</button>
        <div class="game-info">
            <span class="game-level-name" id="game-level-name"></span>
        </div>
        <div class="game-score-wrap">
            <span class="game-score-icon">⭐</span>
            <span id="game-score">0</span>
        </div>
    </div>

    <div class="progress-bar-wrap">
        <div class="progress-bar" id="game-progress-bar"></div>
    </div>

    <div class="timer-wrap" id="timer-wrap" style="display:none">
        <div class="timer-circle" id="timer-circle">
            <span id="timer-text">30</span>
        </div>
    </div>

    <!-- Game Container: content injected by JS -->
    <div class="game-container" id="game-container"></div>

    <div class="game-feedback" id="game-feedback" style="display:none">
        <div class="feedback-icon" id="feedback-icon"></div>
        <div class="feedback-text" id="feedback-text"></div>
    </div>
</div>

<!-- LEVEL COMPLETE SCREEN -->
<div id="screen-complete" class="screen">
    <div class="complete-content">
        <div class="fireworks" id="fireworks"></div>
        <div class="complete-icon" id="complete-icon">🎉</div>
        <h2 class="complete-title" id="complete-title">أحسنت!</h2>
        <p class="complete-sub" id="complete-sub">لقد أكملت المستوى</p>
        <div class="stars-earned" id="stars-earned"></div>
        <div class="complete-xp" id="complete-xp">+50 XP</div>
        <div class="complete-btns">
            <button class="btn-primary" id="btn-next-level">المستوى التالي ←</button>
            <button class="btn-secondary" id="btn-back-to-map">العودة للخريطة</button>
            <button class="btn-ghost" id="btn-replay">إعادة المستوى 🔄</button>
        </div>
    </div>
</div>

<!-- ACHIEVEMENT TOAST -->
<div class="achievement-toast" id="achievement-toast" style="display:none">
    <div class="toast-icon" id="toast-icon">🏆</div>
    <div class="toast-content">
        <div class="toast-title">إنجاز جديد!</div>
        <div class="toast-text" id="toast-text"></div>
    </div>
</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading-overlay" style="display:none">
    <div class="loading-spinner">
        <div class="spinner-ring"></div>
        <div class="loading-text">جارٍ التحميل...</div>
    </div>
</div>

<script src="jeux5.js"></script>
</body>
</html>
