<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumiLearn | لعبة ألغاز الرياضيات</title>
    <link rel="stylesheet" href="jeux1.css" />
    <style>
        /* Small fix for Arabic spacing */
        .desktop-nav { gap: 10px; }
        .top-ctrl { font-family: 'Poppins', 'Cairo', sans-serif; }
    </style>
</head>
<body>
    <!-- ============ Header (Style LumiLearn) ============ -->
    <header class="main-header">
        <div class="header-container">
            <h1>🌟 LumiLearn</h1>
            <nav class="desktop-nav">
                <a href="jeux_ar.html" class="home-btn">🏠 عودة</a>
                
                <div class="game-controls">
                    <select id="difficulty" class="top-ctrl">
                        <option value="easy">سهل (6)</option>
                        <option value="medium">متوسط (8)</option>
                        <option value="hard">صعب (10)</option>
                    </select>
                    <button id="new_game" class="top-ctrl">لغز جديد</button>
                    <button id="reset_game" class="top-ctrl">تصفير النتيجة</button>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="left_side">
            <div id="target_box">
                الهدف: <span id="target"></span>
            </div>
            <div id="expression">محاولتك</div>
            
            <h3>اختر الأرقام</h3>
            <div id="numbers_container"></div>
            
            <h3>اختر العمليات</h3>
            <div id="operators_container">
                <button>+</button>
                <button>-</button>
                <button>*</button>
                <button>/</button>
            </div>
            
            <div id="game_actions">
                <button id="attempt">تطبيق</button>
                <button id="undo">تراجع</button>
                <button id="restart">إعادة</button>
            </div>
            <div id="message"></div>
        </div>

        <div class="right_side">
            <div id="score_box">
                النتيجة الإجمالية: <span id="score">0</span>
            </div>
            <div id="bonus_info">
                مكافأة الصعوبة: <span id="bonus">10</span>
            </div>

            <h3>السجل</h3>
            <div id="history"></div>
        </div>
    </main>

    <script src="jeux1_ar.js"></script>
</body>
</html>
