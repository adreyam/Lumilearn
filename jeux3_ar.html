<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumiLearn | تصريف الأفعال</title>
    <link rel="stylesheet" href="jeux3.css" />
</head>
<body>

    <!-- ===== Header ===== -->
    <header class="main-header">
        <div class="header-container">
            <h1>🌟 LumiLearn</h1>
            <nav class="desktop-nav">
                <a href="jeux_ar.html" class="home-btn">🏠 عودة</a>
                <div class="game-controls">
                    <span id="timer-badge" class="top-ctrl" style="cursor:default;">⏱ ∞</span>
                    <select id="tense-select" class="top-ctrl">
                        <option value="all">كل الأزمنة</option>
                        <option value="past">الماضي</option>
                        <option value="present">المضارع</option>
                        <option value="future">المستقبل</option>
                    </select>
                    <select id="mode-select" class="top-ctrl">
                        <option value="mcq">اختيار من متعدد</option>
                        <option value="type">اكتب الإجابة</option>
                    </select>
                    <button id="restart-btn" class="top-ctrl">إعادة البداية</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- ===== Main ===== -->
    <main>

        <!-- Left: Game -->
        <div class="left_side">

            <!-- Level bar -->
            <div class="panel">
                <div class="panel-label">المستوى</div>
                <div class="level-bar" id="level-bar"></div>
                <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
            </div>

            <!-- Question card -->
            <div class="panel" id="game-area">
                <div class="panel-label">السؤال</div>

                <!-- tense badge + verb -->
                <div class="tense-badge" id="tense-badge">الماضي</div>
                <div class="verb-display" id="verb-display">—</div>
                <div class="sentence-box" id="sentence-box">اختر الضمير والزمن لتبدأ</div>

                <!-- pronoun target -->
                <div class="pronoun-target" id="pronoun-target"></div>

                <!-- MCQ choices -->
                <div class="choices" id="choices"></div>

                <!-- Type mode input -->
                <div class="type-area" id="type-area" style="display:none">
                    <input type="text" id="type-input" class="type-input" placeholder="اكتب التصريف هنا..." autocomplete="off" />
                    <button class="check-btn" id="check-btn">تحقق ✓</button>
                </div>

                <div class="msg-box" id="msg-box"></div>
                <button class="next-btn" id="next-btn" disabled>السؤال التالي ←</button>
            </div>

            <!-- Hint -->
            <div class="panel hint-panel" id="hint-panel">
                <span>💡</span> <strong>تلميح:</strong> <span id="hint-text">سيظهر هنا</span>
            </div>
        </div>

        <!-- Right: Stats + Conjugation table -->
        <div class="right_side">

            <div class="panel score-panel">
                <div class="panel-label">النقاط</div>
                <span class="score-big" id="score-disp">0</span>
                <div class="panel-label" style="margin-top:10px">السلسلة</div>
                <div class="streak-bar" id="streak-bar"></div>
            </div>

            <div class="panel">
                <div class="panel-label" style="margin-bottom:10px">إحصائياتك</div>
                <div class="stat-row"><span>صحيح</span><span class="stat-val green" id="st-correct">0</span></div>
                <div class="stat-row"><span>خطأ</span><span class="stat-val red" id="st-wrong">0</span></div>
                <div class="stat-row"><span>الدقة</span><span class="stat-val" id="st-acc">—</span></div>
                <div class="stat-row no-border"><span>المستوى</span><span class="stat-val" id="st-lvl">1</span></div>
            </div>

            <!-- Mini conjugation table for current verb -->
            <div class="panel ref-panel" id="table-panel">
                <div class="panel-label" style="margin-bottom:10px">📖 جدول التصريف</div>
                <div class="conj-table" id="conj-table">
                    اختر فعلاً لعرض جدوله
                </div>
            </div>

        </div>
    </main>

    <script src="jeux3_ar.js"></script>
</body>
</html>
