<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumiLearn | Memory cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="jeux2.css" />
</head>
<body>
    <!-- ============ Header (LumiLearn Style) ============ -->
    <header class="main-header">
        <div class="header-container">
            <h1>🌟 LumiLearn</h1>
            <nav class="desktop-nav">
                <a href="jeux_en.html" class="home-btn">🏠 Return</a>
                
                <div class="game-controls">
                    <button id="restartBtn" class="top-ctrl">Restart</button>
                    <button id="resetBestBtn" class="top-ctrl">Reset Best</button>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <!-- Game board -->
        <div class="left_side">
            <div id="board" class="memory-board">
                <!-- Cards injected dynamically by JS -->
            </div>
        </div>

        <!-- Scores and stats -->
        <div class="right_side">
            <div class="dashboard-box">
                Time Elapsed
                <span id="timerVal" class="dashboard-value">00:00</span>
            </div>
            
            <div class="dashboard-box">
                Moves Played
                <span id="movesVal" class="dashboard-value">0</span>
            </div>

            <div class="best-score-info">
                Best Score (Moves)
                <span id="bestScoreVal">-</span>
            </div>

            <div class="best-score-info">
                Best Time
                <span id="bestTimeVal">-</span>
            </div>
        </div>
    </main>

    <!-- Victory Modal -->
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">Congratulations! 🎉</div>
            <p>You have successfully matched all pairs! You're a superstar.</p>
            <div class="modal-stats">
                <div>Final Time: <span id="finalTimeVal">00:00</span></div>
                <div>Moves taken: <span id="finalMovesVal">0</span></div>
                <div id="newRecordMsg" style="color: var(--primary-pink); font-weight: bold; display: none;">🏆 New personal best!</div>
            </div>
            <button id="replayBtn" class="modal-btn">Play Again</button>
        </div>
    </div>

    <script src="jeux2_en.js"></script>
</body>
</html>
