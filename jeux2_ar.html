<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LumiLearn | بطاقات الذاكرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="jeux2.css" />
    <style>
        body, select, button {
            font-family: 'Poppins', 'Cairo', sans-serif;
        }
        body[dir="rtl"] .header-container {
            flex-direction: row-reverse;
        }
        body[dir="rtl"] .desktop-nav {
            flex-direction: row-reverse;
            gap: 10px;
        }
    </style>
</head>
<body>
    <!-- ============ Header (Style LumiLearn) ============ -->
    <header class="main-header">
        <div class="header-container">
            <h1>🌟 LumiLearn</h1>
            <nav class="desktop-nav">
                <a href="jeux_ar.html" class="home-btn">🏠 عودة</a>
                
                <div class="game-controls">
                    <button id="restartBtn" class="top-ctrl">إعادة اللعب</button>
                    <button id="resetBestBtn" class="top-ctrl">مسح الرقم</button>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <!-- شبكة اللعب -->
        <div class="left_side">
            <div id="board" class="memory-board">
                <!-- الكروت يتم توليدها بواسطة JS -->
            </div>
        </div>

        <!-- إحصائيات اللعب -->
        <div class="right_side">
            <div class="dashboard-box">
                الوقت المنقضي
                <span id="timerVal" class="dashboard-value">00:00</span>
            </div>
            
            <div class="dashboard-box">
                عدد الحركات
                <span id="movesVal" class="dashboard-value">0</span>
            </div>

            <div class="best-score-info">
                أفضل رقم قياسي (حركات)
                <span id="bestScoreVal">-</span>
            </div>

            <div class="best-score-info">
                أفضل وقت
                <span id="bestTimeVal">-</span>
            </div>
        </div>
    </main>

    <!-- نافذة الفوز المنبثقة -->
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title">تهانينا! 🎉</div>
            <p>لقد نجحت في مطابقة جميع البطاقات بنجاح! أنت بطل حقيقي.</p>
            <div class="modal-stats">
                <div>الوقت النهائي: <span id="finalTimeVal">00:00</span></div>
                <div>عدد الحركات: <span id="finalMovesVal">0</span></div>
                <div id="newRecordMsg" style="color: var(--primary-pink); font-weight: bold; display: none;">🏆 رقم قياسي شخصي جديد!</div>
            </div>
            <button id="replayBtn" class="modal-btn">العب مجدداً</button>
        </div>
    </div>

    <script src="jeux2_ar.js"></script>
</body>
</html>
